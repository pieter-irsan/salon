# ref: learn.openapis.org/specification
openapi: "3.0.0"
info:
  version: 0.1.0
  title: Salon Cashier API
servers:
  - url: http://salon.astrono.my.id/api/dev

tags:
  - name: auth
  - name: orders
  - name: workers
  - name: services
  - name: service categories
  - name: payment methods
  - name: reports

security:
  - apiKey: []

paths:

  # orders
  /orders:
    get:
      summary: List orders
      description: >
        Returns paginated order list. Use `from` and `to` for date range filtering.
        Defaults to today if no range provided.
      operationId: listOrders
      tags: [orders]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
        401:
          description: Unauthorized

    post:
      summary: Create order
      description: >
        Creates an order with its items in one request.
        Server computes subtotal, tax, and total from service prices + tax config.
        Commission records are auto-created server-side per order item.
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          description: Unauthorized
        422:
          $ref: '#/components/responses/UnprocessableEntity'
        500:
          description: Internal server error

  /orders/summary:
    get:
      summary: Get order aggregates
      description: >
        Returns aggregate stats for the given date range:
        total order count, total revenue, total commission paid out, and a
        breakdown by payment method.
      operationId: getOrderSummary
      tags: [orders]
      parameters:
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSummary'
        401:
          description: Unauthorized
        500:
          description: Internal server error

  /orders/{id}:
    get:
      summary: Get order detail
      operationId: getOrder
      tags: [orders]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

  # workers
  /workers:
    get:
      summary: List workers
      operationId: listWorkers
      tags: [workers]
      parameters:
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Worker'
        401:
          description: Unauthorized
        500:
          description: Internal server error

    post:
      summary: Create worker
      operationId: createWorker
      tags: [workers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerRequest'
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          description: Unauthorized
        500:
          description: Internal server error

  /workers/{id}:
    get:
      summary: Get worker by ID
      operationId: getWorker
      tags: [workers]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

    put:
      summary: Update worker
      operationId: updateWorker
      tags: [workers]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerRequest'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

    delete:
      summary: Delete worker
      description: >
        Hard delete only if worker has no associated order history.
      operationId: deleteWorker
      tags: [workers]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        409:
          $ref: '#/components/responses/Conflict'
        500:
          description: Internal server error

  /workers/{id}/commissions/summary:
    get:
      summary: Get worker commission aggregates
      description: >
        Returns total commission earned by this worker for the given date range,
        with a breakdown by service.
      operationId: getWorkerCommissionSummary
      tags: [workers]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerCommissionSummary'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

  # services
  /services:
    get:
      summary: List services
      operationId: listServices
      tags: [services]
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Service'
        401:
          description: Unauthorized
        500:
          description: Internal server error

    post:
      summary: Create service
      operationId: createService
      tags: [services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          description: Unauthorized
        500:
          description: Internal server error

  /services/{id}:
    get:
      summary: Get service by ID
      operationId: getService
      tags: [services]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

    put:
      summary: Update service
      operationId: updateService
      tags: [services]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

    delete:
      summary: Delete service
      operationId: deleteService
      tags: [services]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        409:
          $ref: '#/components/responses/Conflict'
        500:
          description: Internal server error

  # service categories
  /service-categories:
    get:
      summary: List service categories
      operationId: listServiceCategories
      tags: [service categories]
      parameters:
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceCategory'
        401:
          description: Unauthorized
        500:
          description: Internal server error

    post:
      summary: Create service category
      operationId: createServiceCategory
      tags: [service categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCategoryRequest'
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceCategory'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          description: Unauthorized
        500:
          description: Internal server error

  /service-categories/{id}:
    get:
      summary: Get service category by ID
      operationId: getServiceCategory
      tags: [service categories]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceCategory'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

    put:
      summary: Update service category
      operationId: updateServiceCategory
      tags: [service categories]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCategoryRequest'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceCategory'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

    delete:
      summary: Delete service category
      operationId: deleteServiceCategory
      tags: [service categories]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        409:
          $ref: '#/components/responses/Conflict'
        500:
          description: Internal server error

  # payment methods
  /payment-methods:
    get:
      summary: List payment methods
      operationId: listPaymentMethods
      tags: [payment methods]
      parameters:
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
        401:
          description: Unauthorized
        500:
          description: Internal server error

    post:
      summary: Create payment method
      operationId: createPaymentMethod
      tags: [payment methods]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentMethodRequest'
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          description: Unauthorized
        500:
          description: Internal server error

  /payment-methods/{id}:
    get:
      summary: Get payment method by ID
      operationId: getPaymentMethod
      tags: [payment methods]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

    put:
      summary: Update payment method
      operationId: updatePaymentMethod
      tags: [payment methods]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentMethodRequest'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        500:
          description: Internal server error

    delete:
      summary: Delete payment method
      operationId: deletePaymentMethod
      tags: [payment methods]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
        404:
          $ref: '#/components/responses/NotFound'
        409:
          $ref: '#/components/responses/Conflict'
        500:
          description: Internal server error

  # reports
  /reports/orders:
    get:
      summary: Download order report
      description: >
        Returns a CSV file containing order history with details suitable for
        UMKM bookkeeping: order date, customer name, services rendered, worker,
        subtotal, discount, tax, total, payment method, and commission per item.
        Filter by date range via `from` and `to`.
      operationId: downloadOrderReport
      tags: [reports]
      parameters:
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: CSV file download
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="orders2024-01.csv"
          content:
            text/csv:
              schema:
                type: string
                format: binary
        401:
          description: Unauthorized
        500:
          description: Internal server error

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: Authorization

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

    FromParam:
      name: from
      in: query
      description: Start date (inclusive), format YYYY-MM-DD
      schema:
        type: string
        format: date

    ToParam:
      name: to
      in: query
      description: End date (inclusive), format YYYY-MM-DD
      schema:
        type: string
        format: date

  responses:
    BadRequest:
      description: Bad request — invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Conflict:
      description: >
        Conflict — e.g. cannot delete a worker/service that has existing order history.
        Deactivate instead.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    UnprocessableEntity:
      description: Unprocessable entity — e.g. inactive service or worker in order
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    PaginatedResponse:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # orders
    Order:
      type: object
      required: [id, customerName, subtotal, tax, taxPercentage, discount, total, paymentMethodId, createdAt]
      properties:
        id:
          type: integer
        customerName:
          type: string
        subtotal:
          type: number
          format: double
        tax:
          type: number
          format: double
        taxPercentage:
          type: number
          format: double
        discount:
          type: number
          format: double
        total:
          type: number
          format: double
        paymentMethodId:
          type: integer
        paymentMethodName:
          type: string
        createdAt:
          type: string
          format: date-time

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/Order'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'

    OrderItem:
      type: object
      required: [id, serviceId, serviceName, workerId, workerName, servicePrice, commissionFee, createdAt]
      properties:
        id:
          type: integer
        serviceId:
          type: integer
        serviceName:
          type: string
        workerId:
          type: integer
        workerName:
          type: string
        servicePrice:
          type: number
          format: double
        commissionFee:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time

    OrderSummary:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        orderCount:
          type: integer
        totalRevenue:
          type: number
          format: double
        totalDiscount:
          type: number
          format: double
        totalTax:
          type: number
          format: double
        totalCommission:
          type: number
          format: double
        byPaymentMethod:
          type: array
          items:
            type: object
            properties:
              paymentMethodId:
                type: integer
              paymentMethodName:
                type: string
              orderCount:
                type: integer
              totalRevenue:
                type: number
                format: double

    CreateOrderRequest:
      type: object
      required: [customerName, paymentMethodId, items]
      properties:
        customerName:
          type: string
        paymentMethodId:
          type: integer
        discount:
          type: number
          format: double
          default: 0
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [serviceId, workerId]
            properties:
              serviceId:
                type: integer
              workerId:
                type: integer

    # workers
    Worker:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    WorkerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    WorkerCommissionSummary:
      type: object
      properties:
        workerId:
          type: integer
        workerName:
          type: string
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        totalCommission:
          type: number
          format: double
        orderCount:
          type: integer
        byService:
          type: array
          items:
            type: object
            properties:
              serviceId:
                type: integer
              serviceName:
                type: string
              count:
                type: integer
              totalCommission:
                type: number
                format: double

    # services
    Service:
      type: object
      required: [id, name, price, categoryId]
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: double
        categoryId:
          type: integer
        categoryName:
          type: string

    ServiceRequest:
      type: object
      required: [name, price, categoryId]
      properties:
        name:
          type: string
        price:
          type: number
          format: double
        categoryId:
          type: integer

    # service categories
    ServiceCategory:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    ServiceCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    # payment methods
    PaymentMethod:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    PaymentMethodRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
